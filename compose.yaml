services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-devtools}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-devtools-password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: ${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT:-1}
    ports:
      - '8123:8123'
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/dev.xml:ro
      - ./clickhouse-users.xml:/etc/clickhouse-server/users.d/dev.xml:ro
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -qO- http://localhost:8123/ping >/dev/null 2>&1']
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      APP_ENV: prod
      LOCAL_ENV: yes
      CLICKHOUSE_HOST: http://clickhouse:8123
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-/tmp}
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - '${PORT:-3021}:3021'
    volumes:
      - ./db:/app/db
      - app-pictures:/app/.picture
      - ${XDG_RUNTIME_DIR:-/tmp}/01-devtools:${XDG_RUNTIME_DIR:-/tmp}/01-devtools

volumes:
  clickhouse-data:
  app-pictures:
