services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-devtools}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-devtools-password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: ${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT:-1}
    ports:
      - '8123:8123'
      - '9000:9000'
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "clickhouse-client --host 127.0.0.1 --user \"$${CLICKHOUSE_USER}\" --password \"$${CLICKHOUSE_PASSWORD}\" --query 'SELECT 1' >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      BASE_URL: '/'
      APP_ENV: 'prod'
      PORT: ${PORT:-3021}
      PICTURE_DIR: ${PICTURE_DIR:-/app/.picture}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      CLIENT_SECRET: ${CLIENT_SECRET:-}
      REDIRECT_URI: ${REDIRECT_URI:-http://localhost:3021/auth/callback}
      SECRET: ${SECRET:-iUokBru8WPSMAuMspijlt7F-Cnpqyg84F36b1G681h0}
      STORE_URL: ${STORE_URL:-}
      STORE_SECRET: ${STORE_SECRET:-}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-http://clickhouse:8123}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-devtools}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-devtools-password}
      LOCAL_ENV: yes
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - '${PORT:-3021}:3021'
    volumes:
      - ./db:/app/db
      - app-pictures:/app/.picture

volumes:
  clickhouse-data:
  app-pictures:
